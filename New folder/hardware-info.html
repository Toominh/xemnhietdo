<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin Phần cứng</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d12;
    --bg2: #10131a;
    --bg3: #151922;
    --border: #1d2535;
    --border2: #26334d;
    --text: #e8edf5;
    --text2: #8a9ab5;
    --text3: #4a5a75;
    --blue: #5b8fff;
    --green: #3dd68c;
    --purple: #a78bfa;
    --amber: #fbbf24;
    --red: #f87171;
    --cyan: #38bdf8;
    --font: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #1a2a50, #0d1a3a);
    border: 1px solid var(--border2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .header-title { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: var(--mono); color: var(--green);
    background: #0a2018; border: 1px solid #1a5035; border-radius: 6px;
    padding: 5px 12px;
  }
  .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text2); font-family: var(--font); font-size: 14px; font-weight: 600;
    padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
  .refresh-btn.spinning svg { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    transition: border-color .2s, transform .15s;
    animation: fadeIn .4s ease forwards;
    opacity: 0;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  @keyframes fadeIn { to { opacity: 1; } }
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .10s; }
  .card:nth-child(3) { animation-delay: .15s; }
  .card:nth-child(4) { animation-delay: .20s; }
  .card:nth-child(5) { animation-delay: .25s; }
  .card:nth-child(6) { animation-delay: .30s; }
  .card:nth-child(7) { animation-delay: .35s; }
  .card:nth-child(8) { animation-delay: .40s; }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); }
  .card-value { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .card-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  /* ── Rows ── */
  .row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #13182200; }
  .row + .row { border-top: 1px solid var(--border); }
  .row-label { font-size: 14px; color: var(--text2); }
  .row-val { font-size: 14px; font-family: var(--mono); font-weight: 600; color: var(--text); text-align: right; max-width: 60%; word-break: break-all; }

  /* ── Progress bar ── */
  .bar-wrap { margin-top: 14px; }
  .bar-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px; }
  .bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }
  .bar-blue { background: linear-gradient(90deg, #2563eb, #5b8fff); }
  .bar-green { background: linear-gradient(90deg, #16a34a, #3dd68c); }
  .bar-amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
  .bar-purple { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
  .bar-red { background: linear-gradient(90deg, #dc2626, #f87171); }

  /* ── Badges ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-family: var(--mono); font-weight: 700;
    margin-top: 10px; margin-right: 4px;
  }
  .badge-green { background: #052e16; color: #3dd68c; border: 1px solid #16a34a33; }
  .badge-blue  { background: #0c1a3a; color: #5b8fff; border: 1px solid #2563eb33; }
  .badge-amber { background: #2a1800; color: #fbbf24; border: 1px solid #d9770633; }
  .badge-red   { background: #2a0a0a; color: #f87171; border: 1px solid #dc262633; }
  .badge-purple{ background: #1a0a2e; color: #a78bfa; border: 1px solid #7c3aed33; }

  /* ── Status ── */
  .status-online { color: var(--green); }
  .status-offline { color: var(--red); }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* ── Spec grid ── */
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .spec-item { background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
  .spec-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 3px; }
  .spec-val { font-size: 14px; font-weight: 700; color: var(--text); }

  /* ── Footer ── */
  .footer {
    margin-top: 28px; padding: 16px 0;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
  }
  .footer-text { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  /* ── Loading ── */
  .loading { color: var(--text3); font-family: var(--mono); font-size: 13px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 600px) {
    .container { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
    .header { padding: 14px 16px; }
    .header-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💻</div>
  <div>
    <div class="header-title">Thông tin Phần cứng</div>
    <div class="header-sub" id="hostLine">Đang quét hệ thống...</div>
  </div>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> LIVE</div>
    <button class="refresh-btn" id="refreshBtn" onclick="gatherAll()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5"/><path d="M20.488 9A9 9 0 0 0 5.64 5.64M3.512 15a9 9 0 0 0 14.848 3.36"/></svg>
      Làm mới
    </button>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="footer">
    <span class="footer-text" id="scanInfo">Chưa quét</span>
    <span class="footer-text">hardware-info.html · Chạy cục bộ</span>
  </div>
</div>

<script>
// ─── Helpers ───────────────────────────────────────────────
function row(label, val) {
  return `<div class="row"><span class="row-label">${label}</span><span class="row-val">${val}</span></div>`;
}
function badge(txt, cls) { return `<span class="badge badge-${cls}">${txt}</span>`; }
function specItem(label, val) {
  return `<div class="spec-item"><div class="spec-label">${label}</div><div class="spec-val">${val}</div></div>`;
}
function barHTML(label, pct, cls) {
  const p = Math.min(100, Math.max(0, Math.round(pct)));
  return `<div class="bar-wrap">
    <div class="bar-head"><span>${label}</span><span>${p}%</span></div>
    <div class="bar-track"><div class="bar-fill bar-${cls}" style="width:0%" data-target="${p}%"></div></div>
  </div>`;
}
function animateBars() {
  document.querySelectorAll('.bar-fill[data-target]').forEach(el => {
    setTimeout(() => { el.style.width = el.dataset.target; }, 80);
  });
}

// ─── Data gatherers ─────────────────────────────────────────
function getCPU() {
  const cores = navigator.hardwareConcurrency || 'N/A';
  const ua = navigator.userAgent;
  let arch = 'x86_64';
  if (/ARM|arm64|aarch64/i.test(ua)) arch = 'ARM64';
  else if (/x86_64|WOW64|Win64/i.test(ua)) arch = 'x86_64';
  else if (/i686|i386/i.test(ua)) arch = 'x86_32';
  return { cores, arch, platform: navigator.platform || 'N/A' };
}

function getRAM() {
  return navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Không đọc được';
}

function getGPU() {
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) return null;
    const ext = gl.getExtension('WEBGL_debug_renderer_info');
    return {
      vendor: ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : 'Ẩn danh',
      renderer: ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : 'Ẩn danh',
      version: gl.getParameter(gl.VERSION),
      glsl: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
      isWebGL2: !!canvas.getContext('webgl2'),
      maxTexture: gl.getParameter(gl.MAX_TEXTURE_SIZE),
    };
  } catch (e) { return null; }
}

function getDisplay() {
  const dpr = window.devicePixelRatio || 1;
  return {
    width: screen.width, height: screen.height,
    availWidth: screen.availWidth, availHeight: screen.availHeight,
    physWidth: Math.round(screen.width * dpr),
    physHeight: Math.round(screen.height * dpr),
    colorDepth: screen.colorDepth,
    dpr: dpr,
    orientation: screen.orientation ? screen.orientation.type : 'N/A',
  };
}

function parseUA() {
  const ua = navigator.userAgent;
  let os = 'Không xác định', osVer = '';
  if (/Windows NT 10\.0/.test(ua)) { os = 'Windows'; osVer = '10 / 11'; }
  else if (/Windows NT 6\.3/.test(ua)) { os = 'Windows'; osVer = '8.1'; }
  else if (/Windows NT 6\.1/.test(ua)) { os = 'Windows'; osVer = '7'; }
  else if (/Mac OS X ([\d_]+)/.test(ua)) { os = 'macOS'; osVer = ua.match(/Mac OS X ([\d_]+)/)[1].replace(/_/g, '.'); }
  else if (/Android ([\d.]+)/.test(ua)) { os = 'Android'; osVer = ua.match(/Android ([\d.]+)/)[1]; }
  else if (/Linux/.test(ua)) { os = 'Linux'; osVer = ''; }
  else if (/iPhone|iPad/.test(ua) && /OS ([\d_]+)/.test(ua)) { os = 'iOS'; osVer = ua.match(/OS ([\d_]+)/)[1].replace(/_/g, '.'); }

  let browser = 'Không rõ', bVer = '';
  if (/Edg\//.test(ua)) { browser = 'Microsoft Edge'; bVer = ua.match(/Edg\/([\d.]+)/)[1]; }
  else if (/OPR\//.test(ua)) { browser = 'Opera'; bVer = ua.match(/OPR\/([\d.]+)/)[1]; }
  else if (/Chrome\/([\d.]+)/.test(ua)) { browser = 'Google Chrome'; bVer = ua.match(/Chrome\/([\d.]+)/)[1]; }
  else if (/Firefox\/([\d.]+)/.test(ua)) { browser = 'Mozilla Firefox'; bVer = ua.match(/Firefox\/([\d.]+)/)[1]; }
  else if (/Safari\//.test(ua) && /Version\/([\d.]+)/.test(ua)) { browser = 'Apple Safari'; bVer = ua.match(/Version\/([\d.]+)/)[1]; }

  return { os, osVer, browser, bVer };
}

async function getNetwork() {
  const nc = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  let ip = 'Đang lấy...';
  try {
    const r = await Promise.race([
      fetch('https://api.ipify.org?format=json'),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
    ]);
    const d = await r.json();
    ip = d.ip;
  } catch { ip = 'Không lấy được'; }
  return {
    online: navigator.onLine,
    type: nc ? nc.effectiveType : 'N/A',
    downlink: nc ? nc.downlink + ' Mbps' : 'N/A',
    rtt: nc ? nc.rtt + ' ms' : 'N/A',
    saveData: nc ? (nc.saveData ? 'Bật' : 'Tắt') : 'N/A',
    ip
  };
}

async function getBattery() {
  try {
    const b = await navigator.getBattery();
    const level = Math.round(b.level * 100);
    let timeStr = 'N/A';
    if (b.charging && b.chargingTime !== Infinity) {
      const m = Math.round(b.chargingTime / 60);
      timeStr = `${Math.floor(m/60)}h ${m%60}m đến đầy`;
    } else if (!b.charging && b.dischargingTime !== Infinity) {
      const m = Math.round(b.dischargingTime / 60);
      timeStr = `${Math.floor(m/60)}h ${m%60}m còn lại`;
    }
    return { supported: true, level, charging: b.charging, timeStr };
  } catch { return { supported: false }; }
}

function getPerf() {
  const nav = performance.getEntriesByType('navigation')[0] || {};
  const mem = performance.memory;
  return {
    loadTime: nav.duration ? Math.round(nav.duration) + ' ms' : 'N/A',
    dns: nav.domainLookupEnd && nav.domainLookupStart ? Math.round(nav.domainLookupEnd - nav.domainLookupStart) + ' ms' : 'N/A',
    ttfb: nav.responseStart && nav.requestStart ? Math.round(nav.responseStart - nav.requestStart) + ' ms' : 'N/A',
    memory: mem ? {
      used: Math.round(mem.usedJSHeapSize / 1048576),
      total: Math.round(mem.totalJSHeapSize / 1048576),
      limit: Math.round(mem.jsHeapSizeLimit / 1048576),
      pct: Math.round((mem.usedJSHeapSize / mem.jsHeapSizeLimit) * 100)
    } : null,
    concurrency: navigator.hardwareConcurrency || 1,
  };
}

function getMedia() {
  const m = navigator.mediaDevices;
  return {
    supported: !!m,
    camera: 'Chưa kiểm tra (cần quyền)',
    mic: 'Chưa kiểm tra (cần quyền)',
    touch: navigator.maxTouchPoints || 0,
    pointers: navigator.maxTouchPoints > 0 ? 'Cảm ứng' : 'Chuột / Touchpad',
  };
}

// ─── Render ──────────────────────────────────────────────────
function renderCards(data) {
  const { cpu, ua, gpu, disp, perf, media } = data;
  const corePct = Math.min(100, Math.round((cpu.cores / 32) * 100));
  const ramVal = navigator.deviceMemory;
  const ramPct = ramVal ? Math.min(100, Math.round((ramVal / 64) * 100)) : 0;

  const cards = [];

  // 1. CPU
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#0e1a35;color:#5b8fff">🖥</div>
        <div class="card-title">Bộ xử lý (CPU)</div>
      </div>
      <div class="card-value">${cpu.cores} luồng logic</div>
      <div class="card-sub">Kiến trúc: ${cpu.arch} · ${cpu.platform}</div>
      ${barHTML('Số luồng (max 32)', corePct, 'blue')}
      <div class="spec-grid" style="margin-top:14px">
        ${specItem('Luồng (lõi ảo)', cpu.cores)}
        ${specItem('Kiến trúc', cpu.arch)}
        ${specItem('Nền tảng', cpu.platform.substring(0,10))}
        ${specItem('JS Workers', cpu.cores + ' tối đa')}
      </div>
    </div>
  `);

  // 2. RAM
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#0a2018;color:#3dd68c">🧠</div>
        <div class="card-title">Bộ nhớ RAM</div>
      </div>
      <div class="card-value">${getRAM()}</div>
      <div class="card-sub">Device Memory API (ước tính gần đúng)</div>
      ${ramVal ? barHTML('RAM (max 64 GB)', ramPct, 'green') : '<div class="loading" style="margin-top:12px">API không khả dụng trong môi trường này</div>'}
      ${ramVal ? `
      <div class="spec-grid" style="margin-top:14px">
        ${specItem('RAM (ước tính)', ramVal + ' GB')}
        ${specItem('Phân loại', ramVal >= 8 ? '≥ 8 GB' : ramVal >= 4 ? '4 GB' : '≤ 2 GB')}
      </div>` : ''}
    </div>
  `);

  // 3. GPU
  const g = gpu;
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#1a0a2e;color:#a78bfa">🎮</div>
        <div class="card-title">Card đồ họa (GPU)</div>
      </div>
      ${g ? `
      <div class="card-value" style="font-size:16px;line-height:1.4">${g.renderer}</div>
      <div class="card-sub">${g.vendor}</div>
      <hr class="divider">
      ${row('Phiên bản WebGL', g.isWebGL2 ? 'WebGL 2.0' : 'WebGL 1.0')}
      ${row('GLSL', g.glsl ? g.glsl.substring(0, 30) : 'N/A')}
      ${row('Texture tối đa', g.maxTexture + ' px')}
      <div style="margin-top:10px">
        ${badge('WebGL ' + (g.isWebGL2 ? '2.0' : '1.0'), 'blue')}
        ${g.renderer.toLowerCase().includes('nvidia') ? badge('NVIDIA', 'green') : ''}
        ${g.renderer.toLowerCase().includes('amd') || g.renderer.toLowerCase().includes('radeon') ? badge('AMD', 'red') : ''}
        ${g.renderer.toLowerCase().includes('intel') ? badge('Intel', 'amber') : ''}
        ${g.renderer.toLowerCase().includes('apple') ? badge('Apple Silicon', 'purple') : ''}
      </div>
      ` : '<div class="loading">Không đọc được thông tin GPU</div>'}
    </div>
  `);

  // 4. Display
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#0a1a2a;color:#38bdf8">🖥</div>
        <div class="card-title">Màn hình</div>
      </div>
      <div class="card-value">${disp.width} × ${disp.height} px</div>
      <div class="card-sub">Vật lý: ${disp.physWidth}×${disp.physHeight} · DPR ${disp.dpr}×</div>
      <hr class="divider">
      ${row('Độ phân giải', disp.width + ' × ' + disp.height)}
      ${row('Phân giải vật lý', disp.physWidth + ' × ' + disp.physHeight)}
      ${row('Khu vực hiển thị', disp.availWidth + ' × ' + disp.availHeight)}
      ${row('Độ sâu màu', disp.colorDepth + ' bit')}
      ${row('Tỉ lệ điểm ảnh', disp.dpr + 'x')}
      ${row('Hướng', disp.orientation)}
      <div style="margin-top:10px">
        ${disp.dpr >= 2 ? badge('HiDPI / Retina', 'blue') : badge('Standard DPI', 'amber')}
        ${disp.colorDepth >= 24 ? badge('True Color', 'green') : ''}
      </div>
    </div>
  `);

  // 5. OS & Browser
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#1a0a0a;color:#f87171">🖱</div>
        <div class="card-title">Hệ điều hành &amp; Trình duyệt</div>
      </div>
      <div class="card-value">${ua.os} ${ua.osVer}</div>
      <div class="card-sub">${ua.browser} ${ua.bVer}</div>
      <hr class="divider">
      ${row('Hệ điều hành', ua.os + ' ' + ua.osVer)}
      ${row('Trình duyệt', ua.browser)}
      ${row('Phiên bản', ua.bVer || 'N/A')}
      ${row('Ngôn ngữ', navigator.language || 'N/A')}
      ${row('Ngôn ngữ phụ', (navigator.languages || []).slice(0,3).join(', '))}
      ${row('Múi giờ', Intl.DateTimeFormat().resolvedOptions().timeZone || 'N/A')}
      ${row('Cookies', navigator.cookieEnabled ? '✅ Bật' : '❌ Tắt')}
      ${row('Do Not Track', navigator.doNotTrack || 'Không bật')}
    </div>
  `);

  // 6. Hiệu suất
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#1a1200;color:#fbbf24">⚡</div>
        <div class="card-title">Hiệu suất</div>
      </div>
      ${row('Thời gian tải trang', perf.loadTime)}
      ${row('DNS Lookup', perf.dns)}
      ${row('Time to First Byte', perf.ttfb)}
      ${perf.memory ? `
      <hr class="divider">
      <div class="card-value" style="font-size:16px">JS Heap: ${perf.memory.used} MB / ${perf.memory.limit} MB</div>
      ${barHTML('JS Heap đã dùng', perf.memory.pct, perf.memory.pct > 80 ? 'red' : perf.memory.pct > 50 ? 'amber' : 'green')}
      ${row('Đã dùng', perf.memory.used + ' MB')}
      ${row('Tổng phân bổ', perf.memory.total + ' MB')}
      ${row('Giới hạn', perf.memory.limit + ' MB')}
      ` : '<div class="loading" style="margin-top:10px">Memory API chỉ khả dụng trên Chrome</div>'}
    </div>
  `);

  // 7. Input & Media
  cards.push(`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#0a1a20;color:#38bdf8">🎤</div>
        <div class="card-title">Input &amp; Phương tiện</div>
      </div>
      ${row('Điểm cảm ứng tối đa', navigator.maxTouchPoints)}
      ${row('Loại trỏ', media.pointers)}
      ${row('Hover', window.matchMedia('(hover: hover)').matches ? 'Hỗ trợ' : 'Không hỗ trợ')}
      ${row('Bàn phím ảo', window.matchMedia('(pointer: coarse)').matches ? 'Có thể có' : 'Không')}
      <hr class="divider">
      ${row('Gyroscope', 'DeviceMotion API' in window ? 'Có thể hỗ trợ' : 'Không')}
      ${row('Vibration API', 'vibrate' in navigator ? '✅ Hỗ trợ' : '❌ Không')}
      ${row('Share API', 'share' in navigator ? '✅ Hỗ trợ' : '❌ Không')}
      ${row('Bluetooth API', 'bluetooth' in navigator ? '✅ Hỗ trợ' : '❌ Không')}
      ${row('USB API', 'usb' in navigator ? '✅ Hỗ trợ' : '❌ Không')}
    </div>
  `);

  // 8. Pin (placeholder, sẽ update async)
  cards.push(`
    <div class="card" id="battCard">
      <div class="card-header">
        <div class="card-icon" style="background:#0a1e14;color:#3dd68c">🔋</div>
        <div class="card-title">Pin</div>
      </div>
      <div class="loading" id="battContent">Đang đọc thông tin pin...</div>
    </div>
  `);

  // 9. Mạng (placeholder, sẽ update async)
  cards.push(`
    <div class="card" id="netCard">
      <div class="card-header">
        <div class="card-icon" style="background:#0a1a2a;color:#38bdf8">🌐</div>
        <div class="card-title">Kết nối mạng</div>
      </div>
      <div class="loading" id="netContent">Đang lấy thông tin mạng...</div>
    </div>
  `);

  document.getElementById('grid').innerHTML = cards.join('');
  animateBars();
}

function updateBattery(batt) {
  const el = document.getElementById('battContent');
  if (!el) return;
  if (!batt.supported) {
    el.innerHTML = `
      <div class="card-value">Thiết bị để bàn</div>
      <div class="card-sub">Không có pin hoặc trình duyệt không hỗ trợ</div>
      ${badge('Desktop', 'amber')}
    `;
    return;
  }
  const bc = batt.level > 60 ? 'green' : batt.level > 25 ? 'amber' : 'red';
  el.innerHTML = `
    <div class="card-value">${batt.level}%</div>
    <div class="card-sub">${batt.charging ? '⚡ Đang sạc' : '🔋 Đang dùng pin'}</div>
    ${barHTML('Mức pin', batt.level, bc)}
    ${row('Trạng thái', batt.charging ? '<span style="color:#3dd68c">Đang sạc ⚡</span>' : 'Đang dùng pin')}
    ${row('Thời gian còn lại', batt.timeStr || 'N/A')}
    ${badge(batt.level + '%', bc)}
    ${batt.charging ? badge('Đang sạc', 'blue') : ''}
  `;
  animateBars();
}

function updateNetwork(net) {
  const el = document.getElementById('netContent');
  if (!el) return;
  const onlineStr = net.online
    ? '<span class="status-online">● Kết nối</span>'
    : '<span class="status-offline">● Mất mạng</span>';
  el.innerHTML = `
    <div class="card-value">${net.ip}</div>
    <div class="card-sub">Địa chỉ IP công khai</div>
    <hr class="divider">
    ${row('Trạng thái', onlineStr)}
    ${row('IP công khai', net.ip)}
    ${row('Loại kết nối', net.type)}
    ${row('Tốc độ tải xuống', net.downlink)}
    ${row('Độ trễ (RTT)', net.rtt)}
    ${row('Tiết kiệm dữ liệu', net.saveData)}
    ${badge(net.online ? 'Online' : 'Offline', net.online ? 'green' : 'red')}
  `;
}

// ─── Main ────────────────────────────────────────────────────
async function gatherAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  const t0 = Date.now();
  const ua = parseUA();

  document.getElementById('hostLine').textContent = ua.os + ' ' + ua.osVer + ' · ' + ua.browser + ' ' + ua.bVer;

  const data = {
    cpu: getCPU(),
    ua,
    gpu: getGPU(),
    disp: getDisplay(),
    perf: getPerf(),
    media: getMedia(),
  };

  renderCards(data);

  // Async: pin
  getBattery().then(updateBattery);

  // Async: mạng
  getNetwork().then(updateNetwork);

  const elapsed = Date.now() - t0;
  document.getElementById('scanInfo').textContent =
    'Quét xong sau ' + elapsed + ' ms · ' + new Date().toLocaleString('vi-VN');

  btn.classList.remove('spinning');
}

gatherAll();
</script>
</body>
</html>
